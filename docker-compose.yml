services:
  api:
    build:
      context: .
    image: wealth-wing-api:local
    container_name: ww-api
    env_file:
      - .env
    environment:
      DB_URL: postgresql+asyncpg://${POSTGRES_USER:-ed}:${POSTGRES_PASSWORD:-123123}@postgres:5432/${POSTGRES_DB:-ww-db}
      FE_URL: ${FE_URL:-http://localhost:3000}
      PORT: ${PORT:-5003}
      RUN_MIGRATIONS: ${RUN_MIGRATIONS:-true}
    ports:
      - "${API_PORT:-5003}:5003"
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:5003/health/ping', timeout=2)\"",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s
    restart: unless-stopped

  postgres:
    image: postgres:17-alpine
    container_name: ww-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-ed}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-123123}
      POSTGRES_DB: ${POSTGRES_DB:-ww-db}
    ports:
      - "${POSTGRES_PORT:-5435}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U \"$${POSTGRES_USER}\" -d \"$${POSTGRES_DB}\""]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
